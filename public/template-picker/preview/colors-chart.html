<!doctype html><html><head><meta charset="utf-8"><title>Chart ramp</title><link rel="stylesheet" href="_card.css"></head>
<body><div class="card-root">
  <div class="label-eyebrow" style="margin-bottom:10px">Chart ramp · blue</div>
  <div style="display:flex;gap:0;border-radius:10px;overflow:hidden;border:1px solid var(--border);height:70px">
    <div style="flex:1;background:var(--chart-1);display:flex;align-items:flex-end;justify-content:center;padding:6px;font-family:var(--font-mono);font-size:10px;color:#0a1a2e">chart-1</div>
    <div style="flex:1;background:var(--chart-2);display:flex;align-items:flex-end;justify-content:center;padding:6px;font-family:var(--font-mono);font-size:10px;color:#fff">chart-2</div>
    <div style="flex:1;background:var(--chart-3);display:flex;align-items:flex-end;justify-content:center;padding:6px;font-family:var(--font-mono);font-size:10px;color:#fff">chart-3</div>
    <div style="flex:1;background:var(--chart-4);display:flex;align-items:flex-end;justify-content:center;padding:6px;font-family:var(--font-mono);font-size:10px;color:#fff">chart-4</div>
    <div style="flex:1;background:var(--chart-5);display:flex;align-items:flex-end;justify-content:center;padding:6px;font-family:var(--font-mono);font-size:10px;color:#fff">chart-5</div>
  </div>
  <div class="label-mono" style="margin-top:10px">Used in CentralOregonSalesChart and market pulse widgets. Pale → brand navy.</div>
</div></body></html>
