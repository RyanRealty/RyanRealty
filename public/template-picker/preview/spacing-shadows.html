<!doctype html><html><head><meta charset="utf-8"><title>Shadows</title><link rel="stylesheet" href="_card.css"></head>
<body><div class="card-root" style="background:#faf8f4">
  <div class="label-eyebrow" style="margin-bottom:14px">Elevation · navy-tinted</div>
  <div class="row" style="gap:20px">
    <div style="width:96px;height:72px;background:#fff;border-radius:10px;box-shadow:var(--shadow-xs);display:flex;align-items:flex-end;justify-content:center;padding:4px;font-family:var(--font-mono);font-size:10px;color:var(--muted-foreground)">xs</div>
    <div style="width:96px;height:72px;background:#fff;border-radius:10px;box-shadow:var(--shadow-sm);display:flex;align-items:flex-end;justify-content:center;padding:4px;font-family:var(--font-mono);font-size:10px;color:var(--muted-foreground)">sm</div>
    <div style="width:96px;height:72px;background:#fff;border-radius:10px;box-shadow:var(--shadow-md);display:flex;align-items:flex-end;justify-content:center;padding:4px;font-family:var(--font-mono);font-size:10px;color:var(--muted-foreground)">md</div>
    <div style="width:96px;height:72px;background:#fff;border-radius:10px;box-shadow:var(--shadow-lg);display:flex;align-items:flex-end;justify-content:center;padding:4px;font-family:var(--font-mono);font-size:10px;color:var(--muted-foreground)">lg</div>
    <div style="width:96px;height:72px;background:#fff;border-radius:10px;box-shadow:var(--shadow-xl);display:flex;align-items:flex-end;justify-content:center;padding:4px;font-family:var(--font-mono);font-size:10px;color:var(--muted-foreground)">xl</div>
  </div>
</div></body></html>
