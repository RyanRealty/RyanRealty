<!doctype html><html><head><meta charset="utf-8"><title>CTA card</title><link rel="stylesheet" href="_card.css"></head>
<body><div class="card-root" style="background:#fff">
  <div class="label-eyebrow" style="margin-bottom:10px">CTA card pattern</div>
  <div style="border:1px solid var(--border);background:#fff;border-radius:14px;padding:22px;box-shadow:var(--shadow-sm);max-width:520px">
    <div style="width:44px;height:44px;border-radius:10px;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
    </div>
    <div style="margin-top:14px;font-size:20px;font-weight:700;letter-spacing:-0.01em">Never miss a new listing</div>
    <div style="margin-top:6px;font-size:14px;color:var(--muted-foreground);line-height:1.5">Save a search and get instant alerts when matching homes hit the market. Set your criteria once and we handle the rest.</div>
    <div style="margin-top:16px;display:flex;gap:10px">
      <button style="background:var(--primary);color:#fff;border:0;padding:9px 18px;border-radius:10px;font-weight:600;font-size:13px;font-family:var(--font-sans)">Set Up Alerts</button>
      <button style="background:#fff;border:1px solid var(--border);padding:9px 18px;border-radius:10px;font-weight:600;font-size:13px;font-family:var(--font-sans)">Browse Listings</button>
    </div>
  </div>
</div></body></html>
