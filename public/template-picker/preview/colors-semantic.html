<!doctype html><html><head><meta charset="utf-8"><title>Semantic colors</title><link rel="stylesheet" href="_card.css"></head>
<body><div class="card-root">
  <div class="label-eyebrow" style="margin-bottom:10px">Semantic</div>
  <div class="grid-3">
    <div class="swatch"><div class="chip" style="background:var(--primary)"></div><div class="meta"><b>primary</b>navy action</div></div>
    <div class="swatch"><div class="chip" style="background:var(--success)"></div><div class="meta"><b>success</b>price drop / saved</div></div>
    <div class="swatch"><div class="chip" style="background:var(--warning)"></div><div class="meta"><b>warning</b>hot / new</div></div>
    <div class="swatch"><div class="chip" style="background:var(--destructive)"></div><div class="meta"><b>destructive</b>remove / error</div></div>
    <div class="swatch"><div class="chip" style="background:var(--accent)"></div><div class="meta"><b>accent</b>subtle emphasis</div></div>
    <div class="swatch"><div class="chip" style="background:var(--secondary)"></div><div class="meta"><b>secondary</b>stone alt</div></div>
  </div>
  <div style="display:flex;gap:8px;margin-top:14px;flex-wrap:wrap">
    <span style="background:rgb(from var(--primary) r g b / 0.1);color:var(--primary);border:1px solid rgb(from var(--primary) r g b / 0.2);padding:3px 10px;border-radius:9999px;font-size:11px;font-weight:500">Hot</span>
    <span style="background:rgb(from var(--warning) r g b / 0.15);border:1px solid rgb(from var(--warning) r g b / 0.3);padding:3px 10px;border-radius:9999px;font-size:11px;font-weight:500">Price drop</span>
    <span style="background:rgb(from var(--success) r g b / 0.15);border:1px solid rgb(from var(--success) r g b / 0.3);padding:3px 10px;border-radius:9999px;font-size:11px;font-weight:500">Popular</span>
    <span style="background:var(--muted);border:1px solid var(--border);padding:3px 10px;border-radius:9999px;font-size:11px;font-weight:500">Neutral</span>
  </div>
</div></body></html>
