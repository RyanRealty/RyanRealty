<!doctype html><html><head><meta charset="utf-8"><title>Tabular numerals</title><link rel="stylesheet" href="_card.css"></head>
<body><div class="card-root">
  <div class="label-eyebrow" style="margin-bottom:10px">Tabular numerals · market stats</div>
  <div class="grid-3">
    <div class="demo-box"><div style="font-size:12px;color:var(--muted-foreground)">Active listings</div><div class="rr-tabular" style="font-size:30px;font-weight:700;margin-top:4px">1,247</div></div>
    <div class="demo-box"><div style="font-size:12px;color:var(--muted-foreground)">Median sale · YTD</div><div class="rr-tabular" style="font-size:30px;font-weight:700;margin-top:4px">$895,000</div></div>
    <div class="demo-box"><div style="font-size:12px;color:var(--muted-foreground)">Days to sell</div><div class="rr-tabular" style="font-size:30px;font-weight:700;margin-top:4px">38</div></div>
  </div>
  <div class="label-mono" style="margin-top:10px">Always rounded. <code>font-variant-numeric: tabular-nums</code>. Unavailable → em-dash.</div>
</div></body></html>
