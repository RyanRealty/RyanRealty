<!doctype html><html><head><meta charset="utf-8"><title>Spacing scale</title><link rel="stylesheet" href="_card.css"></head>
<body><div class="card-root">
  <div class="label-eyebrow" style="margin-bottom:10px">Spacing · tailwind scale</div>
  <div style="display:flex;flex-direction:column;gap:6px;font-family:var(--font-mono);font-size:11px">
    <div style="display:flex;align-items:center;gap:10px"><span style="width:60px;color:var(--muted-foreground)">1 · 4px</span><span style="height:10px;width:4px;background:var(--primary);border-radius:2px"></span></div>
    <div style="display:flex;align-items:center;gap:10px"><span style="width:60px;color:var(--muted-foreground)">2 · 8px</span><span style="height:10px;width:8px;background:var(--primary);border-radius:2px"></span></div>
    <div style="display:flex;align-items:center;gap:10px"><span style="width:60px;color:var(--muted-foreground)">4 · 16px</span><span style="height:10px;width:16px;background:var(--primary);border-radius:2px"></span></div>
    <div style="display:flex;align-items:center;gap:10px"><span style="width:60px;color:var(--muted-foreground)">6 · 24px</span><span style="height:10px;width:24px;background:var(--primary);border-radius:2px"></span></div>
    <div style="display:flex;align-items:center;gap:10px"><span style="width:60px;color:var(--muted-foreground)">8 · 32px</span><span style="height:10px;width:32px;background:var(--primary);border-radius:2px"></span></div>
    <div style="display:flex;align-items:center;gap:10px"><span style="width:60px;color:var(--muted-foreground)">12 · 48px</span><span style="height:10px;width:48px;background:var(--primary);border-radius:2px"></span></div>
    <div style="display:flex;align-items:center;gap:10px"><span style="width:60px;color:var(--muted-foreground)">16 · 64px</span><span style="height:10px;width:64px;background:var(--primary);border-radius:2px"></span></div>
  </div>
  <div class="label-mono" style="margin-top:10px">py-12 · gap-4 · px-4 sm:px-6 · max-w-7xl</div>
</div></body></html>
