# PR auto-labeling rules
# Used by .github/workflows/pr-labeler.yml
# See: https://github.com/actions/labeler

"area:admin":
  - changed-files:
      - any-glob-to-any-file: "app/admin/**"

"area:search":
  - changed-files:
      - any-glob-to-any-file: "app/search/**"

"area:listing":
  - changed-files:
      - any-glob-to-any-file: "app/listing/**"

"area:home":
  - changed-files:
      - any-glob-to-any-file: "app/page.tsx"

"area:sync":
  - changed-files:
      - any-glob-to-any-file:
          - "app/actions/sync*.ts"
          - "app/api/cron/sync*/**"
          - "lib/spark*.ts"
          - "scripts/run-*sync*.mjs"

"area:reporting":
  - changed-files:
      - any-glob-to-any-file:
          - "app/actions/market-*.ts"
          - "app/actions/generate-market-report.ts"
          - "components/reports/**"
          - "app/housing-market/**"

"area:auth":
  - changed-files:
      - any-glob-to-any-file:
          - "app/actions/auth.ts"
          - "lib/supabase/**"
          - "app/auth/**"

"area:ui":
  - changed-files:
      - any-glob-to-any-file: "components/ui/**"

"area:guides":
  - changed-files:
      - any-glob-to-any-file: "app/guides/**"

"area:team":
  - changed-files:
      - any-glob-to-any-file:
          - "app/team/**"
          - "app/actions/brokers.ts"

"type:migration":
  - changed-files:
      - any-glob-to-any-file: "supabase/migrations/**"

"type:config":
  - changed-files:
      - any-glob-to-any-file:
          - "next.config.*"
          - "tsconfig*.json"
          - "package.json"
          - "vercel.json"
          - "eslint.config.*"

"type:ci":
  - changed-files:
      - any-glob-to-any-file: ".github/**"

"type:docs":
  - changed-files:
      - any-glob-to-any-file:
          - "docs/**"
          - "*.md"
          - "CLAUDE.md"
          - "AGENTS.md"

"type:scripts":
  - changed-files:
      - any-glob-to-any-file: "scripts/**"

"area:seo":
  - changed-files:
      - any-glob-to-any-file:
          - "app/sitemap.ts"
          - "app/robots.ts"
          - "lib/seo*.ts"
          - "lib/structured-data*.ts"

"area:crm":
  - changed-files:
      - any-glob-to-any-file:
          - "lib/followupboss.ts"
          - "app/actions/fub*.ts"
          - "app/actions/lead-capture.ts"
