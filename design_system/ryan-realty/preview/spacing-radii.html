<!doctype html><html><head><meta charset="utf-8"><title>Radii</title><link rel="stylesheet" href="_card.css"></head>
<body><div class="card-root">
  <div class="label-eyebrow" style="margin-bottom:10px">Corner radii · base 10px</div>
  <div class="row">
    <div style="width:72px;height:72px;background:var(--primary);border-radius:6px;display:flex;align-items:flex-end;justify-content:center;padding:4px;color:#fff;font-family:var(--font-mono);font-size:10px">sm 6</div>
    <div style="width:72px;height:72px;background:var(--primary);border-radius:8px;display:flex;align-items:flex-end;justify-content:center;padding:4px;color:#fff;font-family:var(--font-mono);font-size:10px">md 8</div>
    <div style="width:72px;height:72px;background:var(--primary);border-radius:10px;display:flex;align-items:flex-end;justify-content:center;padding:4px;color:#fff;font-family:var(--font-mono);font-size:10px">lg 10</div>
    <div style="width:72px;height:72px;background:var(--primary);border-radius:14px;display:flex;align-items:flex-end;justify-content:center;padding:4px;color:#fff;font-family:var(--font-mono);font-size:10px">xl 14</div>
    <div style="width:72px;height:72px;background:var(--primary);border-radius:18px;display:flex;align-items:flex-end;justify-content:center;padding:4px;color:#fff;font-family:var(--font-mono);font-size:10px">2xl 18</div>
    <div style="width:72px;height:72px;background:var(--primary);border-radius:9999px;display:flex;align-items:flex-end;justify-content:center;padding:4px;color:#fff;font-family:var(--font-mono);font-size:10px">pill</div>
  </div>
  <div class="label-mono" style="margin-top:10px">Card = xl · Button/Input = lg · Badge = pill</div>
</div></body></html>
