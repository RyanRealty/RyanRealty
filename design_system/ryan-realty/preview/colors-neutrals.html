<!doctype html><html><head><meta charset="utf-8"><title>Neutrals</title><link rel="stylesheet" href="_card.css"></head>
<body><div class="card-root">
  <div class="label-eyebrow" style="margin-bottom:10px">Neutrals (stone)</div>
  <div class="grid-4">
    <div class="swatch"><div class="chip" style="background:var(--background);border-right:1px solid var(--border)"></div><div class="meta"><b>background</b>oklch(1 0 0)</div></div>
    <div class="swatch"><div class="chip" style="background:var(--card);border-right:1px solid var(--border)"></div><div class="meta"><b>card</b>oklch(1 0 0)</div></div>
    <div class="swatch"><div class="chip" style="background:var(--muted)"></div><div class="meta"><b>muted</b>oklch(0.97 ... 106)</div></div>
    <div class="swatch"><div class="chip" style="background:var(--secondary)"></div><div class="meta"><b>secondary</b>oklch(0.967 ... 286)</div></div>
    <div class="swatch"><div class="chip" style="background:var(--border)"></div><div class="meta"><b>border</b>oklch(0.923 ...)</div></div>
    <div class="swatch"><div class="chip" style="background:var(--muted-foreground)"></div><div class="meta" style="color:var(--muted)"><b style="color:#fff">muted-fg</b>oklch(0.46 ... 58)</div></div>
    <div class="swatch"><div class="chip" style="background:var(--foreground)"></div><div class="meta" style="color:var(--muted)"><b style="color:#fff">foreground</b>oklch(0.147 ...)</div></div>
    <div class="swatch"><div class="chip" style="background:var(--ring)"></div><div class="meta"><b>ring</b>oklch(0.709 ...)</div></div>
  </div>
</div></body></html>
