<!doctype html><html><head><meta charset="utf-8"><title>Buttons</title><link rel="stylesheet" href="_card.css"></head>
<body><div class="card-root">
  <div class="label-eyebrow" style="margin-bottom:12px">Button variants</div>
  <div class="row" style="align-items:center">
    <button style="background:var(--primary);color:var(--primary-foreground);border:0;padding:10px 18px;border-radius:10px;font-weight:600;font-size:14px;font-family:var(--font-sans);cursor:pointer">Set up alerts</button>
    <button style="background:#fff;color:var(--foreground);border:1px solid var(--border);padding:10px 18px;border-radius:10px;font-weight:600;font-size:14px;font-family:var(--font-sans);cursor:pointer">Browse listings</button>
    <button style="background:var(--secondary);color:var(--secondary-foreground);border:0;padding:10px 18px;border-radius:10px;font-weight:600;font-size:14px;font-family:var(--font-sans);cursor:pointer">Secondary</button>
    <button style="background:transparent;color:var(--foreground);border:0;padding:10px 18px;border-radius:10px;font-weight:600;font-size:14px;font-family:var(--font-sans);cursor:pointer">Ghost</button>
    <a href="#" style="color:var(--primary);font-weight:600;font-size:14px;text-decoration:none;border-bottom:1px solid transparent;font-family:var(--font-sans)">Link variant ↗</a>
  </div>
  <div class="label-mono" style="margin-top:14px">radius-lg · active:translate-y-px · focus: 3px stone ring</div>
</div></body></html>
