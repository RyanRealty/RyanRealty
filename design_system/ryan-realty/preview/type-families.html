<!doctype html><html><head><meta charset="utf-8"><title>Type decision tree</title><link rel="stylesheet" href="_card.css"></head>
<body><div class="card-root">
  <div class="label-eyebrow" style="margin-bottom:14px">Three families · decision ladder</div>
  <div style="display:grid;grid-template-columns:auto 1fr;gap:14px 18px;align-items:baseline">
    <div style="font-family:var(--font-display);font-size:40px;color:var(--rr-navy);line-height:1;letter-spacing:-0.01em">Amboqia</div>
    <div style="font-size:12px;color:var(--muted-foreground)">Primary display · wordmark · hero H1 · heritage signage</div>

    <div style="font-family:var(--font-accent);font-size:22px;color:var(--rr-navy);line-height:1;text-transform:uppercase;letter-spacing:0.1em;font-weight:500">Azo Sans</div>
    <div style="font-size:12px;color:var(--muted-foreground)">Accent sans · ribbon sub-labels under the wordmark</div>

    <div style="font-family:var(--font-sans);font-size:22px;color:var(--foreground);line-height:1;font-weight:600">Geist Sans</div>
    <div style="font-size:12px;color:var(--muted-foreground)">UI + body + data · everywhere the app speaks</div>
  </div>
</div></body></html>
