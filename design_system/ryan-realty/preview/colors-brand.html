<!doctype html><html><head><meta charset="utf-8"><title>Brand colors</title><link rel="stylesheet" href="_card.css"></head>
<body><div class="card-root">
  <div class="label-eyebrow" style="margin-bottom:10px">Brand core</div>
  <div class="grid-4">
    <div class="swatch"><div class="chip" style="background:#102742"></div><div class="meta"><b>Navy</b>#102742<span>primary</span></div></div>
    <div class="swatch"><div class="chip" style="background:#0a1a2e"></div><div class="meta"><b>Navy deep</b>#0a1a2e<span>hover / pressed</span></div></div>
    <div class="swatch"><div class="chip" style="background:#faf8f4;border-right:1px solid var(--border)"></div><div class="meta"><b>Cream</b>#faf8f4<span>warm surface</span></div></div>
    <div class="swatch"><div class="chip" style="background:#e8e2d4"></div><div class="meta"><b>Sand</b>#e8e2d4<span>stone neutral</span></div></div>
    <div class="swatch"><div class="chip" style="background:#2e4a3a"></div><div class="meta"><b>Fir</b>#2e4a3a<span>forest accent</span></div></div>
    <div class="swatch"><div class="chip" style="background:#8fb8d4"></div><div class="meta"><b>Sky</b>#8fb8d4<span>Deschutes accent</span></div></div>
  </div>
</div></body></html>
