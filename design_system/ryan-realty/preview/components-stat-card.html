<!doctype html><html><head><meta charset="utf-8"><title>Stat card</title><link rel="stylesheet" href="_card.css"></head>
<body><div class="card-root">
  <div class="label-eyebrow" style="margin-bottom:10px">Market stat · card</div>
  <div class="grid-2" style="max-width:560px">
    <div style="background:#fff;border:1px solid var(--border);border-radius:14px;padding:16px;box-shadow:var(--shadow-sm)">
      <div style="font-size:14px;font-weight:500;color:var(--foreground)">Active residential listings</div>
      <div class="rr-tabular" style="font-size:30px;font-weight:700;margin-top:8px;color:var(--foreground)">1,247</div>
    </div>
    <div style="background:#fff;border:1px solid var(--border);border-radius:14px;padding:16px;box-shadow:var(--shadow-sm)">
      <div style="font-size:14px;font-weight:500;color:var(--foreground)">Typical days to sell</div>
      <div class="rr-tabular" style="font-size:30px;font-weight:700;margin-top:8px;color:var(--foreground)">38</div>
      <div style="font-size:11px;color:var(--muted-foreground);margin-top:4px">Median days on market for closed sales YTD</div>
    </div>
  </div>
</div></body></html>
