<!doctype html><html><head><meta charset="utf-8"><title>Listing card</title><link rel="stylesheet" href="_card.css"></head>
<body><div class="card-root">
  <div class="label-eyebrow" style="margin-bottom:10px">Listing tile</div>
  <div style="background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 0 0 1px rgb(from var(--foreground) r g b / 0.1), var(--shadow-sm);max-width:320px">
    <div style="position:relative;height:180px;background:url('../assets/hero-poster.webp') center/cover">
      <span style="position:absolute;top:10px;left:10px;background:var(--primary);color:#fff;padding:3px 10px;border-radius:9999px;font-size:11px;font-weight:500;font-family:var(--font-sans)">Hot</span>
      <span style="position:absolute;top:10px;right:10px;width:32px;height:32px;background:rgba(255,255,255,0.9);border-radius:9999px;display:flex;align-items:center;justify-content:center">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#102742" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
      </span>
    </div>
    <div style="padding:12px 14px 14px">
      <div class="rr-tabular" style="font-size:20px;font-weight:700;color:var(--foreground)">$895,000</div>
      <div style="font-size:13px;color:var(--foreground);margin-top:2px">2732 NW Ordway Ave</div>
      <div style="font-size:12px;color:var(--muted-foreground);margin-top:1px">Bend, OR 97703</div>
      <div style="font-size:12px;color:var(--muted-foreground);margin-top:8px;font-variant-numeric:tabular-nums">3 bd · 2 ba · 1,820 sqft</div>
    </div>
  </div>
</div></body></html>
