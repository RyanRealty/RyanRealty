<!doctype html><html><head><meta charset="utf-8"><title>Form input</title><link rel="stylesheet" href="_card.css"></head>
<body><div class="card-root">
  <div class="label-eyebrow" style="margin-bottom:12px">Search · input + CTA</div>
  <form onsubmit="event.preventDefault()" style="display:flex;box-shadow:var(--shadow-lg);border-radius:10px;overflow:hidden;background:#fff;max-width:560px">
    <input type="search" placeholder="City, community, neighborhood, address, or broker…" style="flex:1;min-width:0;padding:14px 16px;font-size:15px;font-family:var(--font-sans);border:0;outline:none;color:var(--foreground);background:transparent">
    <button type="submit" style="background:var(--secondary);color:var(--secondary-foreground);border:0;padding:0 24px;font-weight:600;font-size:14px;font-family:var(--font-sans);cursor:pointer">Search</button>
  </form>
  <div class="label-mono" style="margin-top:12px">Hero search pattern. Rounded-lg. Secondary-variant CTA. Shadow-lg.</div>
</div></body></html>
